services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-scribe-db
    environment:
      POSTGRES_USER: ${DB_USER:-scribe_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scribe_pass}
      POSTGRES_DB: ${DB_NAME:-ai_scribe_db}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scribe_user} -d ${DB_NAME:-ai_scribe_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-scribe-api
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-scribe_user}
      DB_PASSWORD: ${DB_PASSWORD:-scribe_pass}
      DB_NAME: ${DB_NAME:-ai_scribe_db}
      DATABASE_URL: postgresql://${DB_USER:-scribe_user}:${DB_PASSWORD:-scribe_pass}@postgres:5432/${DB_NAME:-ai_scribe_db}
      CORS_ORIGIN: http://localhost:3000
      UPLOAD_DIR: /app/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MOCK_MODE: ${AI_MOCK_MODE:-true}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
    ports:
      - "3001:3001"
    volumes:
      - audio_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: ai-scribe-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      API_INTERNAL_URL: http://backend:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  audio_uploads:
